{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}StudyPilot Django Preview{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'planner/styles.css' %}" />
  </head>
  <body>
    <header class="site-header">
      <div class="page-shell header-content">
        <div>
          <p class="eyebrow">StudyPilot</p>
          <h1 class="site-title">Django Preview</h1>
        </div>
        <nav class="site-nav">
          <a href="{% url 'planner:dashboard' %}">Dashboard</a>
          <a href="{% url 'planner:task_list' %}">Tasks</a>
          <a href="{% url 'planner:add_task' %}">Add Task</a>
          <a href="{% url 'planner:session_list' %}">Sessions</a>
          <a href="{% url 'planner:add_session' %}">Log Session</a>
          <a href="/admin/">Admin</a>
        </nav>
      </div>
    </header>

    <main class="page-shell page-content">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
